<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Details</title>
</head>

<body>

<h2>Employee Details</h2>

<form>

<h3>01. Personal Information</h3>

<table>
<tr>
    <td>Employee Name *</td>
    <td><input type="text" placeholder="First Name"></td>
    <td>Last Name</td>
    <td><input type="text" placeholder="Last Name"></td>
</tr>

<tr>
    <td>Starting Date</td>
    <td><input type="date"></td>
    <td>Birth Date</td>
    <td><input type="date"></td>
</tr>

<tr>
    <td>Employee Type</td>
    <td>
        <select>
            <option>Select</option>
            <option>Full Time</option>
            <option>Part Time</option>
            <option>Intern</option>
        </select>
    </td>
    <td>Gender</td>
    <td>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
    </td>
</tr>

<tr>
    <td>Position</td>
    <td colspan="3"><input type="text" placeholder="Position"></td>
</tr>
</table>

<h3>02. Location</h3>

<table>
<tr>
    <td>City</td>
    <td><input type="text" placeholder="City"></td>
    <td>State</td>
    <td><input type="text" placeholder="State"></td>
</tr>

<tr>
    <td>ZIP</td>
    <td><input type="text" placeholder="ZIP"></td>
    <td>Address</td>
    <td><textarea placeholder="Address"></textarea></td>
</tr>
</table>

<h3>03. Contact Information</h3>

<table>
<tr>
    <td>Phone</td>
    <td><input type="text" placeholder="Phone"></td>
    <td>Email</td>
    <td><input type="email" placeholder="Email"></td>
</tr>
</table>

<br>
<button type="submit">Register</button>

</form>

</body>
</html>
